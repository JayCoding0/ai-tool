# ============================================================
# AI Agent Platform - Docker Compose 编排
# 用法:
#   启动: docker-compose up -d
#   停止: docker-compose down
#   查看日志: docker-compose logs -f ai-agent
#
# 架构: Nginx(:80) → ai-agent(:8080) → MySQL(:3306)
# ============================================================

services:
  # ─── AI Agent 应用服务 ──────────────────────────────────
  ai-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-agent
    expose:
      - "8080"                          # HTTP 服务（由 Nginx 代理，不直接暴露）
    ports:
      - "${MCP_PORT:-8001}:8001"     # MCP 服务（直连）
    volumes:
      - ./trpc_go.yaml:/app/trpc_go.yaml:ro    # 配置文件（只读挂载）
      - ./logs:/app/logs                         # 日志持久化
      - ./skills:/app/skills                     # Skill 技能目录（支持热更新）
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── MySQL 数据库 ──────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ai-agent-mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ai_agent_2024}
      MYSQL_DATABASE: ai_chat_db
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql                                       # 数据持久化
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro  # 自动建表
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro      # 自动插入预设数据
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=200
      - --innodb-buffer-pool-size=256M
    restart: unless-stopped
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-ai_agent_2024}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Nginx 前端 + 反向代理 ─────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ai-agent-nginx
    ports:
      - "${HTTP_PORT:-80}:80"         # HTTP 入口
      # - "${HTTPS_PORT:-443}:443"    # HTTPS（生产环境取消注释）
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro  # Nginx 配置
      - ./frontend:/usr/share/nginx/html:ro                    # 前端静态文件
      # - ./nginx/ssl:/etc/ssl:ro                              # SSL 证书（生产环境取消注释）
    depends_on:
      ai-agent:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/login.html"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

# ─── 数据卷 ──────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local

# ─── 网络 ────────────────────────────────────────────────
networks:
  ai-network:
    driver: bridge
