<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智能小助手</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <style>
        :root {
            --primary: #4e6ef2;
            --primary-light: #eef1fe;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: #f7f8fa;
            display: flex;
        }

        /* 左侧装饰区 */
        .left-panel {
            flex: 1;
            background: linear-gradient(145deg, #4e6ef2 0%, #7c5cfc 60%, #a855f7 100%);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 60px;
            position: relative; overflow: hidden;
        }
        .left-panel::before {
            content: '';
            position: absolute; top: -100px; right: -100px;
            width: 350px; height: 350px;
            background: rgba(255,255,255,0.07);
            border-radius: 50%;
        }
        .left-panel::after {
            content: '';
            position: absolute; bottom: -80px; left: -80px;
            width: 280px; height: 280px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }
        .left-content { position: relative; z-index: 1; text-align: center; }
        .left-logo {
            width: 72px; height: 72px;
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(10px);
            border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
            font-size: 34px;
            margin: 0 auto 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%,100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }
        .left-title { color: #fff; font-size: 28px; font-weight: 700; margin-bottom: 12px; }
        .left-desc { color: rgba(255,255,255,0.65); font-size: 15px; line-height: 1.7; max-width: 320px; }

        .feature-list { margin-top: 40px; display: flex; flex-direction: column; gap: 14px; }
        .feature-item {
            display: flex; align-items: center; gap: 12px;
            color: rgba(255,255,255,0.8); font-size: 14px;
        }
        .feature-dot {
            width: 8px; height: 8px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%; flex-shrink: 0;
        }

        /* 右侧登录区 */
        .right-panel {
            width: 480px; flex-shrink: 0;
            background: #fff;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 60px 56px;
        }
        .form-header { width: 100%; margin-bottom: 32px; }
        .form-title { font-size: 24px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
        .form-sub { font-size: 14px; color: #999; }

        /* Tab */
        .tab-row {
            display: flex; gap: 0;
            border-bottom: 1px solid #f0f0f0;
            margin-bottom: 28px; width: 100%;
        }
        .tab-item {
            padding: 10px 20px 12px;
            background: none; border: none; cursor: pointer;
            font-size: 15px; font-weight: 500; color: #bbb;
            position: relative; transition: color 0.15s;
        }
        .tab-item.active { color: #1a1a1a; }
        .tab-item.active::after {
            content: '';
            position: absolute; bottom: -1px; left: 0; right: 0;
            height: 2px; background: var(--primary); border-radius: 2px;
        }

        /* 表单 */
        .form-wrap { width: 100%; }
        .form-field { margin-bottom: 18px; }
        .field-label { font-size: 13px; font-weight: 500; color: #555; margin-bottom: 7px; display: block; }
        .field-hint { color: #bbb; font-weight: 400; font-size: 12px; }

        .error-tip { color: #ef4444; font-size: 12px; text-align: center; margin-bottom: 14px; padding: 8px 12px; background: #fef2f2; border-radius: 8px; }
        .success-tip { color: #10b981; font-size: 12px; text-align: center; margin-bottom: 14px; padding: 8px 12px; background: #f0fdf4; border-radius: 8px; }

        .submit-btn {
            width: 100%; height: 44px;
            background: var(--primary);
            color: #fff; border: none; border-radius: 10px;
            font-size: 15px; font-weight: 600;
            cursor: pointer; transition: background 0.15s, transform 0.1s;
            margin-bottom: 16px;
        }
        .submit-btn:hover { background: #3d5ce0; }
        .submit-btn:active { transform: scale(0.99); }

        .divider-row {
            display: flex; align-items: center; gap: 12px;
            margin: 4px 0 16px;
        }
        .divider-row::before, .divider-row::after {
            content: ''; flex: 1; height: 1px; background: #f0f0f0;
        }
        .divider-row span { font-size: 12px; color: #ccc; }

        .guest-btn {
            width: 100%; height: 42px;
            background: #f7f8fa;
            color: #666; border: 1.5px solid #e8e8e8; border-radius: 10px;
            font-size: 14px; font-weight: 500;
            cursor: pointer; transition: all 0.15s;
            display: flex; align-items: center; justify-content: center; gap: 7px;
        }
        .guest-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

        .footer-note { margin-top: 32px; font-size: 12px; color: #ccc; text-align: center; }

        /* Element Plus 覆盖 */
        .el-input__wrapper { border-radius: 10px !important; height: 42px !important; }
        .el-input__inner { font-size: 14px !important; }

        /* 响应式 */
        @media (max-width: 768px) {
            .left-panel { display: none; }
            .right-panel { width: 100%; padding: 40px 28px; }
        }
    </style>
</head>
<body>
<div id="app" style="display:flex;min-height:100vh;">
    <!-- 左侧装饰 -->
    <div class="left-panel">
        <div class="left-content">
            <div class="left-logo">🤖</div>
            <div class="left-title">智能小助手</div>
            <div class="left-desc">基于大语言模型的智能对话助手，支持云端与本地模型切换</div>
            <div class="feature-list">
                <div class="feature-item"><div class="feature-dot"></div>支持多种主流大语言模型</div>
                <div class="feature-item"><div class="feature-dot"></div>本地模型保护数据隐私</div>
                <div class="feature-item"><div class="feature-dot"></div>历史会话自动保存</div>
                <div class="feature-item"><div class="feature-dot"></div>支持思维链推理展示</div>
            </div>
        </div>
    </div>

    <!-- 右侧表单 -->
    <div class="right-panel">
        <div class="form-header">
            <div class="form-title">{{ tab === 'login' ? '欢迎回来' : '创建账号' }}</div>
            <div class="form-sub">{{ tab === 'login' ? '登录你的智能小助手账号' : '注册后即可保存对话历史' }}</div>
        </div>

        <div class="tab-row">
            <button class="tab-item" :class="{active: tab === 'login'}" @click="tab = 'login'">登录</button>
            <button class="tab-item" :class="{active: tab === 'register'}" @click="tab = 'register'">注册</button>
        </div>

        <!-- 登录 -->
        <div v-if="tab === 'login'" class="form-wrap">
            <div class="form-field">
                <label class="field-label">用户名</label>
                <el-input v-model="loginForm.username" placeholder="请输入用户名"
                    prefix-icon="User" size="large" autocomplete="username"
                    @keyup.enter="doLogin" />
            </div>
            <div class="form-field">
                <label class="field-label">密码</label>
                <el-input v-model="loginForm.password" type="password" placeholder="请输入密码"
                    prefix-icon="Lock" size="large" show-password autocomplete="current-password"
                    @keyup.enter="doLogin" />
            </div>
            <div v-if="loginError" class="error-tip">{{ loginError }}</div>
            <button class="submit-btn" :disabled="loginLoading" @click="doLogin">
                {{ loginLoading ? '登录中...' : '登 录' }}
            </button>
        </div><div v-else class="form-wrap">
            <div class="form-field">
                <label class="field-label">用户名 <span class="field-hint">（3-50个字符）</span></label>
                <el-input v-model="regForm.username" placeholder="请输入用户名"
                    prefix-icon="User" size="large" autocomplete="username" />
            </div>
            <div class="form-field">
                <label class="field-label">密码 <span class="field-hint">（至少6位）</span></label>
                <el-input v-model="regForm.password" type="password" placeholder="请输入密码"
                    prefix-icon="Lock" size="large" show-password autocomplete="new-password" />
            </div>
            <div class="form-field">
                <label class="field-label">确认密码</label>
                <el-input v-model="regForm.password2" type="password" placeholder="请再次输入密码"
                    prefix-icon="Lock" size="large" show-password autocomplete="new-password"
                    @keyup.enter="doRegister" />
            </div>
            <div v-if="regError" class="error-tip">{{ regError }}</div>
            <div v-if="regSuccess" class="success-tip">{{ regSuccess }}</div>
            <button class="submit-btn" :disabled="regLoading" @click="doRegister">
                {{ regLoading ? '注册中...' : '注 册' }}
            </button>
        </div>

        <div class="divider-row"><span>或者</span></div>

        <button class="guest-btn" @click="guestLogin">
            <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            游客模式（无需注册）
        </button>

        <div class="footer-note">内容由 AI 生成，仅供参考</div>
    </div>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/@element-plus/icons-vue"></script>
<script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
<script>
const { createApp, ref } = Vue;
const { ElMessage } = ElementPlus;

const app = createApp({
    setup() {
        const tab = ref('login');
        const loginForm = ref({ username: '', password: '' });
        const loginError = ref('');
        const loginLoading = ref(false);
        const regForm = ref({ username: '', password: '', password2: '' });
        const regError = ref('');
        const regSuccess = ref('');
        const regLoading = ref(false);

        async function doLogin() {
            loginError.value = '';
            if (!loginForm.value.username || !loginForm.value.password) {
                loginError.value = '请填写用户名和密码'; return;
            }
            loginLoading.value = true;
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: loginForm.value.username, password: loginForm.value.password })
                });
                const data = await res.json();
                if (!res.ok) { loginError.value = data.error || '登录失败'; return; }
                localStorage.removeItem('chatSessionId');
                localStorage.setItem('auth_token', data.token);
                localStorage.setItem('username', data.username);
                localStorage.setItem('user_id', data.user_id);
                localStorage.setItem('user_role', data.role || 'user');
                ElMessage({ message: '登录成功', type: 'success', duration: 800 });
                setTimeout(() => window.location.href = '/', 600);
            } catch (e) {
                loginError.value = '网络错误，请重试';
            } finally {
                loginLoading.value = false;
            }
        }

        async function doRegister() {
            regError.value = ''; regSuccess.value = '';
            if (!regForm.value.username || !regForm.value.password) {
                regError.value = '请填写用户名和密码'; return;
            }
            if (regForm.value.password !== regForm.value.password2) {
                regError.value = '两次密码不一致'; return;
            }
            regLoading.value = true;
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: regForm.value.username, password: regForm.value.password })
                });
                const data = await res.json();
                if (!res.ok) { regError.value = data.error || '注册失败'; return; }
                localStorage.removeItem('chatSessionId');
                localStorage.setItem('auth_token', data.token);
                localStorage.setItem('username', data.username);
                localStorage.setItem('user_id', data.user_id);
                localStorage.setItem('user_role', data.role || 'user');
                regSuccess.value = '注册成功，正在跳转...';
                setTimeout(() => window.location.href = '/', 600);
            } catch (e) {
                regError.value = '网络错误，请重试';
            } finally {
                regLoading.value = false;
            }
        }

        function guestLogin() {
            localStorage.removeItem('auth_token');
            localStorage.removeItem('username');
            localStorage.removeItem('user_id');
            localStorage.removeItem('chatSessionId');
            window.location.href = '/';
        }

        return { tab, loginForm, loginError, loginLoading, regForm, regError, regSuccess, regLoading, doLogin, doRegister, guestLogin };
    }
});

for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
    app.component(key, component);
}
const zhCn = ElementPlus.lang && ElementPlus.lang.zhCn ? ElementPlus.lang.zhCn : undefined;
app.use(ElementPlus, zhCn ? { locale: zhCn } : {});
app.mount('#app');
</script>
</body>
</html>
