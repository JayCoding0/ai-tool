<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作流编排 - 智能Agent平台</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔀</text></svg>">
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="workflow-style.css">
    <!-- dagre 自动布局库 -->
    <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
</head>
<body>
<div id="wf-app">
    <!-- ===== 列表视图 ===== -->
    <template v-if="view === 'list'">
        <div class="nav-bar">
            <a href="/" class="nav-logo">🤖 智能Agent平台</a>
            <a href="/" class="nav-link">💬 对话</a>
            <a href="/knowledge.html" class="nav-link">📚 知识库</a>
            <a href="/workflow.html" class="nav-link active">🔀 工作流</a>
            <a href="/eval.html" class="nav-link">📊 评估</a>
            <a href="/memory.html" class="nav-link">🧠 记忆</a>
            <a href="/cache.html" class="nav-link">⚡ 缓存</a>
        </div>
        <div class="wf-page">
            <div class="wf-header">
                <h1>🔀 工作流编排</h1>
                <div style="display:flex;gap:8px;">
                    <el-button type="success" plain @click="importWorkflow">📥 导入</el-button>
                    <el-button type="primary" @click="showCreateDialog = true" :icon="Plus">新建工作流</el-button>
                </div>
            </div>

            <div v-if="workflows.length === 0 && !listLoading" class="empty-state">
                <div class="empty-icon">🔀</div>
                <div>暂无工作流，点击「新建工作流」开始编排</div>
            </div>

            <div v-for="wf in workflows" :key="wf.id" class="wf-card" @click="openEditor(wf)">
                <div class="wf-card-header">
                    <div>
                        <div class="wf-card-title">{{ wf.name }}</div>
                        <div class="wf-card-desc">{{ wf.description || '暂无描述' }}</div>
                        <div class="wf-card-stats">
                            <span class="wf-stat" :class="wf.status">{{ statusLabel(wf.status) }}</span>
                            <span class="wf-stat">📦 {{ (wf.nodes || []).length }} 个节点</span>
                            <span class="wf-stat">🔗 {{ (wf.edges || []).length }} 条连线</span>
                            <span class="wf-stat">v{{ wf.version }}</span>
                        </div>
                    </div>
                    <div style="display:flex;gap:8px;flex-shrink:0;margin-left:16px;" @click.stop>
                        <el-button size="small" @click.stop="openEditor(wf)">编辑</el-button>
                        <el-button size="small" type="success" @click.stop="quickExecute(wf)" :disabled="(wf.nodes || []).length < 2">执行</el-button>
                        <el-button size="small" type="info" plain @click.stop="exportWorkflow(wf)">📤 导出</el-button>
                        <el-button size="small" type="warning" @click.stop="publishWorkflow(wf)" :disabled="wf.status === 'published'">发布</el-button>
                        <el-button size="small" type="danger" @click.stop="deleteWorkflow(wf)">删除</el-button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 新建工作流对话框 -->
        <el-dialog v-model="showCreateDialog" title="新建工作流" width="480px">
            <el-form :model="createForm" label-width="80px">
                <el-form-item label="名称" required>
                    <el-input v-model="createForm.name" placeholder="例如：智能客服流程" />
                </el-form-item>
                <el-form-item label="描述">
                    <el-input v-model="createForm.description" type="textarea" :rows="3" placeholder="工作流用途说明（可选）" />
                </el-form-item>
            </el-form>
            <template #footer>
                <el-button @click="showCreateDialog = false">取消</el-button>
                <el-button type="primary" @click="createWorkflow" :loading="creating">创建</el-button>
            </template>
        </el-dialog>

        <!-- 快速执行对话框 -->
        <el-dialog v-model="showExecDialog" :title="'执行工作流：' + (execWorkflow ? execWorkflow.name : '')" width="640px" :close-on-click-modal="false">
            <div v-if="execWorkflow && execWorkflow.variables && execWorkflow.variables.length > 0" style="margin-bottom:16px;">
                <div style="font-size:13px;font-weight:600;color:#555;margin-bottom:8px;">输入变量</div>
                <div v-for="v in execWorkflow.variables" :key="v.name" class="var-input-row">
                    <label>{{ v.name }} <span v-if="v.required" class="var-required">*</span></label>
                    <el-input v-model="execInputs[v.name]" :placeholder="v.description || v.name" size="small" style="flex:1;" />
                </div>
            </div>
            <div v-else style="font-size:13px;color:#999;margin-bottom:12px;">该工作流无需输入变量</div>

            <div v-if="execEvents.length > 0" style="margin-top:8px;">
                <div style="font-size:13px;font-weight:600;color:#555;margin-bottom:8px;">执行日志</div>
                <div style="max-height:500px;overflow-y:auto;">
                    <div v-for="(evt, i) in execEvents" :key="i" class="exec-event" :class="evt.type">
                        <span class="event-icon">{{ eventIcon(evt.type) }}</span>
                        <span class="event-text" v-if="evt.type === 'node_output'">
                            <span class="node-label">{{ evt.node_name || evt.node_id }} 输出：</span>
                            <span class="node-output-content">{{ formatNodeOutput(evt.output) }}</span>
                        </span>
                        <span class="event-text" v-else>{{ eventText(evt) }}</span>
                        <span v-if="evt.duration_ms" class="event-time">{{ evt.duration_ms }}ms</span>
                    </div>
                </div>
                <div v-if="execFinalOutput" class="exec-output">{{ execFinalOutput }}</div>
            </div>

            <template #footer>
                <el-button @click="showExecDialog = false">关闭</el-button>
                <el-button type="primary" @click="doExecute" :loading="executing" :disabled="executing">
                    {{ executing ? '执行中...' : '▶ 执行' }}
                </el-button>
            </template>
        </el-dialog>
    </template>

    <!-- ===== 编辑器视图 ===== -->
    <template v-if="view === 'editor'">
        <div class="editor-container">
            <!-- 左侧节点面板 -->
            <div class="editor-sidebar">
                <div class="editor-sidebar-header">
                    <div style="display:flex;align-items:center;justify-content:space-between;">
                        <h3>🔀 {{ currentWorkflow ? currentWorkflow.name : '' }}</h3>
                        <el-button text size="small" @click="backToList" style="padding:4px;">✕</el-button>
                    </div>
                    <div style="display:flex;gap:6px;margin-top:8px;">
                        <el-button size="small" type="primary" @click="saveWorkflow" :loading="saving">💾 保存</el-button>
                        <el-button size="small" type="success" @click="openExecPanel">▶ 执行</el-button>
                    </div>
                </div>
                <div class="node-palette">
                    <div style="font-size:12px;font-weight:600;color:#999;margin-bottom:8px;">拖拽添加节点</div>
                    <div v-for="nt in nodeTypes" :key="nt.type" class="palette-item"
                         draggable="true"
                         :style="'--palette-color:' + paletteColor(nt.type)"
                         @dragstart="onDragStart($event, nt.type)">
                        <span class="p-icon">{{ nt.icon }}</span>
                        <div>
                            <div class="p-label">{{ nt.label }}</div>
                            <div class="p-desc">{{ nt.desc }}</div>
                        </div>
                    </div>
                </div>

                <!-- 变量管理 -->
                <div style="padding:12px;border-top:1px solid #e8e8f0;">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
                        <span style="font-size:12px;font-weight:600;color:#999;">全局变量</span>
                        <el-button text size="small" @click="addVariable">+ 添加</el-button>
                    </div>
                    <div v-for="(v, i) in editorVariables" :key="i" style="display:flex;align-items:center;gap:4px;margin-bottom:4px;">
                        <el-input v-model="v.name" size="small" placeholder="变量名" style="flex:1;" />
                        <el-checkbox v-model="v.required" size="small" title="必填" />
                        <el-button text size="small" type="danger" @click="editorVariables.splice(i,1)">✕</el-button>
                    </div>
                </div>
            </div>

            <!-- 中间画布 -->
            <div class="editor-canvas" ref="canvasRef"
                 @drop.prevent="onCanvasDrop"
                 @dragover.prevent
                 @mousedown="onCanvasMouseDown"
                 @mousemove="onCanvasMouseMove"
                 @mouseup="onCanvasMouseUp"
                 @click="onCanvasClick">
                <div class="canvas-toolbar">
                    <button @click="zoomIn" title="放大">🔍+</button>
                    <button @click="zoomOut" title="缩小">🔍-</button>
                    <button @click="resetZoom" title="重置视图">↺</button>
                    <button @click="fitView" title="适应画布">⊞</button>
                    <button @click="autoLayout" title="自动布局（dagre）">📐 自动布局</button>
                    <button @click="undo" :disabled="!canUndo" title="撤销 (Ctrl+Z)">↩</button>
                    <button @click="redo" :disabled="!canRedo" title="重做 (Ctrl+Y)">↪</button>
                    <span style="font-size:11px;color:#999;padding:6px;">{{ Math.round(zoom * 100) }}%</span>
                </div>
                <div class="canvas-actions">
                    <el-button size="small" type="warning" plain @click="clearSelection" v-if="selectedNodeIds.length > 1">取消多选 ({{ selectedNodeIds.length }})</el-button>
                    <el-button size="small" type="danger" plain @click="deleteSelected" :disabled="!selectedNodeId && !selectedEdgeId && selectedNodeIds.length === 0">🗑 删除选中</el-button>
                </div>

                <svg class="dag-svg" ref="svgRef"
                     :viewBox="svgViewBox"
                     @wheel.prevent="onWheel"
                     @mousedown.self="onSvgMouseDown"
                     @mousemove="onSvgMouseMove"
                     @mouseup="onSvgMouseUp">
                    <defs>
                        <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                            <polygon points="0 0, 8 3, 0 6" fill="#c0c0d0" />
                        </marker>
                        <marker id="arrowhead-active" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                            <polygon points="0 0, 8 3, 0 6" fill="#6366f1" />
                        </marker>
                        <!-- 节点渐变色 -->
                        <linearGradient id="grad-start" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#52c41a" /><stop offset="100%" stop-color="#389e0d" />
                        </linearGradient>
                        <linearGradient id="grad-end" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#8c8c8c" /><stop offset="100%" stop-color="#595959" />
                        </linearGradient>
                        <linearGradient id="grad-llm" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#7c8cf5" /><stop offset="100%" stop-color="#5b6de8" />
                        </linearGradient>
                        <linearGradient id="grad-tool" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#faad14" /><stop offset="100%" stop-color="#d48806" />
                        </linearGradient>
                        <linearGradient id="grad-agent" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#9254de" /><stop offset="100%" stop-color="#722ed1" />
                        </linearGradient>
                        <linearGradient id="grad-template" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#40a9ff" /><stop offset="100%" stop-color="#1890ff" />
                        </linearGradient>
                        <linearGradient id="grad-http" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#ff7875" /><stop offset="100%" stop-color="#f5222d" />
                        </linearGradient>
                        <linearGradient id="grad-condition" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#ffc53d" /><stop offset="100%" stop-color="#faad14" />
                        </linearGradient>
                        <linearGradient id="grad-parallel" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#36cfc9" /><stop offset="100%" stop-color="#13c2c2" />
                        </linearGradient>
                        <linearGradient id="grad-code" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#73d13d" /><stop offset="100%" stop-color="#52c41a" />
                        </linearGradient>
                        <linearGradient id="grad-loop" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#f759ab" /><stop offset="100%" stop-color="#eb2f96" />
                        </linearGradient>
                    </defs>

                    <!-- 网格背景 -->
                    <defs>
                        <pattern id="grid-small" width="20" height="20" patternUnits="userSpaceOnUse">
                            <circle cx="10" cy="10" r="0.8" fill="#d0d0e0" />
                        </pattern>
                        <pattern id="grid-large" width="100" height="100" patternUnits="userSpaceOnUse">
                            <rect width="100" height="100" fill="url(#grid-small)" />
                            <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#e0e0f0" stroke-width="0.5" />
                        </pattern>
                    </defs>
                    <rect width="5000" height="5000" x="-2500" y="-2500" fill="url(#grid-large)" />

                    <!-- 对齐辅助线 -->
                    <line v-for="(guide, gi) in alignGuides" :key="'guide_' + gi"
                          :x1="guide.x1" :y1="guide.y1" :x2="guide.x2" :y2="guide.y2"
                          class="align-guide" />

                    <!-- 框选区域 -->
                    <rect v-if="selectionBox" class="selection-box"
                          :x="Math.min(selectionBox.x1, selectionBox.x2)"
                          :y="Math.min(selectionBox.y1, selectionBox.y2)"
                          :width="Math.abs(selectionBox.x2 - selectionBox.x1)"
                          :height="Math.abs(selectionBox.y2 - selectionBox.y1)" />

                    <!-- 连线 -->
                    <g v-for="edge in editorEdges" :key="edge.id">
                        <path :d="getEdgePath(edge)"
                              class="edge-path"
                              :class="{'edge-selected': selectedEdgeId === edge.id, 'edge-animated': edgeAnimations[edge.id]}"
                              :style="selectedEdgeId === edge.id ? 'stroke:#6366f1;stroke-width:2.5;marker-end:url(#arrowhead-active)' : ''"
                              @click.stop="selectEdge(edge.id)" />
                        <!-- 边标签（条件分支名称） -->
                        <g v-if="edge.label">
                            <rect :x="getEdgeMidpoint(edge).x - edge.label.length * 5 - 6"
                                  :y="getEdgeMidpoint(edge).y - 16"
                                  :width="edge.label.length * 10 + 12" height="18"
                                  rx="9" ry="9" fill="#fff" stroke="#e6a23c" stroke-width="1" opacity="0.95" />
                            <text :x="getEdgeMidpoint(edge).x" :y="getEdgeMidpoint(edge).y - 4"
                                  text-anchor="middle" font-size="10" fill="#d48806" font-weight="600">
                                {{ edge.label }}
                            </text>
                        </g>
                    </g>

                    <!-- 正在拖拽的连线 -->
                    <path v-if="draggingEdge" :d="draggingEdgePath" class="edge-path" style="stroke:#6366f1;stroke-dasharray:5 3;" />

                    <!-- 节点 -->
                    <g v-for="node in editorNodes" :key="node.id"
                       class="node-group"
                       :class="{'node-selected': selectedNodeId === node.id || selectedNodeIds.includes(node.id), ['node-' + getNodeExecStatus(node.id)]: getNodeExecStatus(node.id)}"
                       :transform="'translate(' + node.position.x + ',' + node.position.y + ')'"
                       @mousedown.stop="onNodeMouseDown($event, node)"
                       @click.stop="selectNode(node.id, $event)">

                        <!-- 开始/结束节点：胶囊形 -->
                        <template v-if="node.type === 'start' || node.type === 'end'">
                            <rect class="node-shape" x="0" y="0" :width="nodeWidth(node)" :height="nodeHeight(node)"
                                  :rx="nodeHeight(node)/2" :ry="nodeHeight(node)/2"
                                  :fill="nodeColor(node.type)" stroke="#e0e0e0" stroke-width="1" />
                        </template>

                        <!-- 条件节点：菱形 -->
                        <template v-else-if="node.type === 'condition'">
                            <polygon class="node-shape"
                                     :points="diamondPoints(node)"
                                     :fill="nodeColor(node.type)" stroke="#e0e0e0" stroke-width="1" />
                        </template>

                        <!-- 并行汇聚节点：六边形 -->
                        <template v-else-if="node.type === 'parallel'">
                            <polygon class="node-shape"
                                     :points="hexagonPoints(node)"
                                     :fill="nodeColor(node.type)" stroke="#e0e0e0" stroke-width="1" />
                        </template>

                        <!-- 普通节点：圆角矩形 -->
                        <template v-else>
                            <rect class="node-shape node-rect" x="0" y="0" :width="nodeWidth(node)" :height="nodeHeight(node)"
                                  :fill="nodeColor(node.type)" stroke="#e0e0e0" stroke-width="1" />
                        </template>

                        <!-- 图标和名称 -->
                        <text :x="nodeWidth(node)/2" :y="nodeHeight(node)/2 - 6" text-anchor="middle" font-size="18" fill="#fff">{{ nodeIcon(node.type) }}</text>
                        <text :x="nodeWidth(node)/2" :y="nodeHeight(node)/2 + 12" text-anchor="middle" font-size="11" fill="#fff" font-weight="500">{{ node.name || nodeLabel(node.type) }}</text>

                        <!-- 条件节点：分支标签（显示在右侧端口旁） -->
                        <template v-if="node.type === 'condition' && node.config && node.config.conditions">
                            <text v-for="(cond, ci) in node.config.conditions" :key="'label_' + ci"
                                  :x="nodeWidth(node) + 14" :y="conditionPortY(ci, node) + 4"
                                  text-anchor="start" font-size="9" fill="#e6a23c" font-weight="500">
                                {{ cond.label || (cond.is_default ? '默认' : ('分支' + (ci+1))) }}
                            </text>
                        </template>

                        <!-- 输入端口（左侧） -->
                        <circle v-if="node.type !== 'start'" class="port port-in"
                                :cx="getPortPos(node, 'in').x" :cy="getPortPos(node, 'in').y" r="5" fill="#fff" stroke="#b0b0b0" stroke-width="1.5"
                                @mouseup.stop="onPortMouseUp(node.id, 'in')" />

                        <!-- 输入端口（顶部，额外） -->
                        <circle v-if="node.type !== 'start' && node.type !== 'condition'" class="port port-in"
                                :cx="nodeWidth(node)/2" cy="0" r="5" fill="#fff" stroke="#b0b0b0" stroke-width="1.5"
                                @mouseup.stop="onPortMouseUp(node.id, 'in')" />

                        <!-- 普通输出端口（右侧，非条件节点） -->
                        <circle v-if="node.type !== 'end' && node.type !== 'condition'" class="port port-out"
                                :cx="getPortPos(node, 'out').x" :cy="getPortPos(node, 'out').y" r="5" fill="#fff" stroke="#b0b0b0" stroke-width="1.5"
                                @mousedown.stop="onPortMouseDown($event, node.id, 'out')" />

                        <!-- 底部输出端口（额外） -->
                        <circle v-if="node.type !== 'end' && node.type !== 'condition'" class="port port-out"
                                :cx="nodeWidth(node)/2" :cy="nodeHeight(node)" r="5" fill="#fff" stroke="#b0b0b0" stroke-width="1.5"
                                @mousedown.stop="onPortMouseDown($event, node.id, 'out')" />

                        <!-- 条件节点：多个输出端口（每个分支一个，右侧） -->
                        <template v-if="node.type === 'condition' && node.config && node.config.conditions">
                            <circle v-for="(cond, ci) in node.config.conditions" :key="'port_' + ci"
                                    class="port port-out"
                                    :cx="nodeWidth(node)" :cy="conditionPortY(ci, node)" r="5"
                                    :fill="cond.is_default ? '#ffd666' : '#fff'" stroke="#b0b0b0" stroke-width="1.5"
                                    @mousedown.stop="onPortMouseDown($event, node.id, 'out', cond.id)" />
                        </template>
                    </g>
                </svg>

                <!-- MiniMap 小地图 -->
                <div class="minimap" v-if="editorNodes.length > 0">
                    <svg :viewBox="minimapViewBox" class="minimap-svg" @click="onMinimapClick">
                        <rect v-for="node in editorNodes" :key="'mm_' + node.id"
                              :x="node.position.x" :y="node.position.y"
                              :width="nodeWidth(node)" :height="nodeHeight(node)"
                              :fill="minimapNodeColor(node.type)" rx="3" ry="3" />
                        <path v-for="edge in editorEdges" :key="'mme_' + edge.id"
                              :d="getEdgePath(edge)" fill="none" stroke="#c0c0d0" stroke-width="1" />
                        <rect class="minimap-viewport"
                              :x="minimapViewport.x" :y="minimapViewport.y"
                              :width="minimapViewport.w" :height="minimapViewport.h" />
                    </svg>
                </div>
            </div>

            <!-- 右侧配置面板 -->
            <div class="editor-panel" v-if="selectedNodeId">
                <div class="panel-header">
                    <h3>{{ selectedNode ? (nodeIcon(selectedNode.type) + ' ' + (selectedNode.name || nodeLabel(selectedNode.type))) : '节点配置' }}</h3>
                    <el-button text size="small" @click="selectedNodeId = null">✕</el-button>
                </div>
                <div class="panel-body" v-if="selectedNode">
                    <!-- 基本信息 -->
                    <div class="panel-section">
                        <div class="panel-section-title">基本信息</div>
                        <div class="panel-field">
                            <label>节点名称</label>
                            <el-input v-model="selectedNode.name" size="small" placeholder="节点名称" />
                        </div>
                        <div class="panel-field">
                            <label>节点类型</label>
                            <el-tag size="small">{{ nodeLabel(selectedNode.type) }}</el-tag>
                        </div>
                    </div>

                    <!-- LLM 节点配置 -->
                    <template v-if="selectedNode.type === 'llm'">
                        <div class="panel-section">
                            <div class="panel-section-title">LLM 配置</div>
                            <div class="panel-field">
                                <label>System Prompt</label>
                                <el-input v-model="selectedNode.config.system_prompt" type="textarea" :rows="4" size="small" placeholder="你是一个有用的助手..." />
                            </div>
                            <div class="panel-field">
                                <label>User Prompt <span style="font-size:11px;color:#999;">（支持 ${变量名} 或 ${node_id.output}）</span></label>
                                <el-input v-model="selectedNode.config.user_prompt" type="textarea" :rows="3" size="small" placeholder="${query}" />
                            </div>
                            <div class="panel-field">
                                <label>模型名称 <span style="font-size:11px;color:#999;">（留空使用默认模型）</span></label>
                                <el-input v-model="selectedNode.config.model_name" size="small" placeholder="默认模型" />
                            </div>
                            <div class="panel-field">
                                <label>输出格式 <span style="font-size:11px;color:#999;">（结构化输出，保证下游可解析）</span></label>
                                <el-select v-model="selectedNode.config.response_format" size="small" style="width:100%;" placeholder="文本（默认）" clearable>
                                    <el-option label="文本（默认）" value="text" />
                                    <el-option label="JSON 对象（保证合法 JSON）" value="json_object" />
                                    <el-option label="JSON Schema（严格结构约束）" value="json_schema" />
                                </el-select>
                            </div>
                            <template v-if="selectedNode.config.response_format === 'json_schema'">
                                <div class="panel-field">
                                    <label>JSON Schema <span style="font-size:11px;color:#999;">（JSON Schema 对象）</span></label>
                                    <el-input v-model="selectedNode.config.json_schema" type="textarea" :rows="6" size="small" placeholder='{"type":"object","properties":{"name":{"type":"string"}},"required":["name"]}' />
                                </div>
                                <div class="panel-field">
                                    <el-checkbox v-model="selectedNode.config.schema_strict" size="small">严格模式（strict，模型完全遵循 schema）</el-checkbox>
                                </div>
                            </template>
                            <div class="panel-field">
                                <label>推理强度 <span style="font-size:11px;color:#999;">（仅推理模型 o1/o3/R1 生效）</span></label>
                                <el-select v-model="selectedNode.config.reasoning_effort" size="small" style="width:100%;" placeholder="默认（不指定）" clearable>
                                    <el-option label="低（low，更快）" value="low" />
                                    <el-option label="中（medium）" value="medium" />
                                    <el-option label="高（high，更深入）" value="high" />
                                </el-select>
                            </div>
                        </div>
                    </template>

                    <!-- Tool 节点配置 -->
                    <template v-if="selectedNode.type === 'tool'">
                        <div class="panel-section">
                            <div class="panel-section-title">工具配置</div>
                            <div class="panel-field">
                                <label>工具名称</label>
                                <el-select v-model="selectedNode.config.tool_name" size="small" style="width:100%;" filterable placeholder="选择工具" :loading="toolListLoading">
                                    <el-option v-for="t in availableTools" :key="t.name" :label="(t.display_name || t.name) + ' - ' + (t.description || '').slice(0, 30)" :value="t.name" />
                                </el-select>
                            </div>
                            <div class="panel-field">
                                <label>工具参数 <span style="font-size:11px;color:#999;">（JSON 格式，支持 ${} 引用）</span></label>
                                <el-input v-model="toolArgsJson" type="textarea" :rows="4" size="small" placeholder='{"city": "${query}"}' @change="updateToolArgs" />
                            </div>
                        </div>
                    </template>

                    <!-- Agent 节点配置 -->
                    <template v-if="selectedNode.type === 'agent'">
                        <div class="panel-section">
                            <div class="panel-section-title">Agent 配置</div>
                            <div class="panel-field">
                                <label>Agent 名称</label>
                                <el-select v-model="selectedNode.config.agent_name" size="small" style="width:100%;" filterable placeholder="选择子 Agent" :loading="agentListLoading">
                                    <el-option v-for="a in availableAgents" :key="a.name" :label="a.display_name + ' - ' + (a.description || '').slice(0, 30)" :value="a.name" />
                                </el-select>
                            </div>
                            <div class="panel-field">
                                <label>发送消息 <span style="font-size:11px;color:#999;">（支持 ${} 引用）</span></label>
                                <el-input v-model="selectedNode.config.agent_message" type="textarea" :rows="3" size="small" placeholder="${query}" />
                            </div>
                        </div>
                    </template>

                    <!-- Template 节点配置 -->
                    <template v-if="selectedNode.type === 'template'">
                        <div class="panel-section">
                            <div class="panel-section-title">模板配置</div>
                            <div class="panel-field">
                                <label>模板内容 <span style="font-size:11px;color:#999;">（支持 ${node_id.output} 引用上游输出）</span></label>
                                <el-input v-model="selectedNode.config.template" type="textarea" :rows="5" size="small" placeholder="根据 ${llm_1.output} 的结果..." />
                            </div>
                        </div>
                    </template>

                    <!-- HTTP 节点配置 -->
                    <template v-if="selectedNode.type === 'http'">
                        <div class="panel-section">
                            <div class="panel-section-title">HTTP 配置</div>
                            <div class="panel-field">
                                <label>请求方法</label>
                                <el-select v-model="selectedNode.config.method" size="small" style="width:100%;">
                                    <el-option label="GET" value="GET" />
                                    <el-option label="POST" value="POST" />
                                    <el-option label="PUT" value="PUT" />
                                    <el-option label="DELETE" value="DELETE" />
                                </el-select>
                            </div>
                            <div class="panel-field">
                                <label>URL</label>
                                <el-input v-model="selectedNode.config.url" size="small" placeholder="https://api.example.com/..." />
                            </div>
                            <div class="panel-field">
                                <label>请求体 <span style="font-size:11px;color:#999;">（支持 ${} 引用）</span></label>
                                <el-input v-model="selectedNode.config.body" type="textarea" :rows="3" size="small" placeholder='{"key": "value"}' />
                            </div>
                        </div>
                    </template>

                    <!-- Condition 条件分支节点配置 -->
                    <template v-if="selectedNode.type === 'condition'">
                        <div class="panel-section">
                            <div class="panel-section-title">
                                条件分支
                                <el-button text size="small" type="primary" @click="addConditionBranch" style="float:right;">+ 添加分支</el-button>
                            </div>
                            <div v-if="!selectedNode.config.conditions || selectedNode.config.conditions.length === 0"
                                 style="font-size:12px;color:#999;padding:8px 0;">
                                暂无条件分支，请点击"+ 添加分支"
                            </div>
                            <div v-for="(cond, ci) in (selectedNode.config.conditions || [])" :key="cond.id"
                                 style="border:1px solid #e8e8f0;border-radius:6px;padding:10px;margin-bottom:8px;background:#fafafa;">
                                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
                                    <span style="font-size:12px;font-weight:600;color:#555;">
                                        {{ cond.is_default ? '🔘 默认分支' : ('分支 ' + (ci + 1)) }}
                                    </span>
                                    <el-button text size="small" type="danger" @click="selectedNode.config.conditions.splice(ci, 1)">✕</el-button>
                                </div>
                                <div class="panel-field" v-if="!cond.is_default">
                                    <label>分支标签</label>
                                    <el-input v-model="cond.label" size="small" placeholder="如：是、否、大于100" />
                                </div>
                                <div class="panel-field" v-if="!cond.is_default">
                                    <label>判断字段 <span style="font-size:11px;color:#999;">（支持 ${node_id.output}）</span></label>
                                    <el-input v-model="cond.field" size="small" placeholder="${llm_1.output}" />
                                </div>
                                <div class="panel-field" v-if="!cond.is_default">
                                    <label>操作符</label>
                                    <el-select v-model="cond.operator" size="small" style="width:100%;">
                                        <el-option label="等于 (==)" value="==" />
                                        <el-option label="不等于 (!=)" value="!=" />
                                        <el-option label="大于 (>)" value=">" />
                                        <el-option label="小于 (<)" value="<" />
                                        <el-option label="大于等于 (>=)" value=">=" />
                                        <el-option label="小于等于 (<=)" value="<=" />
                                        <el-option label="包含 (contains)" value="contains" />
                                        <el-option label="不包含 (not_contains)" value="not_contains" />
                                        <el-option label="为空 (is_empty)" value="is_empty" />
                                        <el-option label="不为空 (is_not_empty)" value="is_not_empty" />
                                        <el-option label="匹配正则 (matches)" value="matches" />
                                        <el-option label="不匹配正则 (not_matches)" value="not_matches" />
                                    </el-select>
                                </div>
                                <div class="panel-field" v-if="!cond.is_default && !['is_empty','is_not_empty'].includes(cond.operator)">
                                    <label>比较值</label>
                                    <el-input v-model="cond.value" size="small" placeholder="比较值（支持 ${} 引用）" />
                                </div>
                                <div class="panel-field">
                                    <el-checkbox v-model="cond.is_default" size="small"
                                                 @change="(val) => { if(val) { selectedNode.config.conditions.forEach((c,i) => { if(i !== ci) c.is_default = false; }); } }">
                                        设为默认分支（兜底）
                                    </el-checkbox>
                                </div>
                            </div>
                            <div style="font-size:11px;color:#999;padding:4px 0;">
                                💡 条件按顺序评估，第一个匹配的分支生效。建议设置一个默认分支作为兜底。<br>
                                从条件节点的不同输出端口连线到不同的下游节点即可实现分支路由。
                            </div>
                        </div>
                    </template>

                    <!-- Parallel 并行汇聚节点配置 -->
                    <template v-if="selectedNode.type === 'parallel'">
                        <div class="panel-section">
                            <div class="panel-section-title">并行汇聚配置</div>
                            <div class="panel-field">
                                <el-checkbox v-model="selectedNode.config.wait_all" size="small">
                                    等待所有上游分支完成
                                </el-checkbox>
                                <div style="font-size:11px;color:#999;margin-top:4px;">
                                    勾选后，所有上游并行分支执行完毕才继续；否则任一分支完成即继续。
                                </div>
                            </div>
                            <div style="font-size:11px;color:#999;padding:8px 0;">
                                💡 并行汇聚节点用于合并多个并行分支的输出。<br>
                                将多个并行分支的输出连线到此节点，它会收集所有上游输出并合并后传递给下游。
                            </div>
                        </div>
                    </template>

                    <!-- Code 代码执行节点配置（Phase 3） -->
                    <template v-if="selectedNode.type === 'code'">
                        <div class="panel-section">
                            <div class="panel-section-title">💻 代码执行配置</div>
                            <div class="panel-field">
                                <label>代码语言</label>
                                <el-select v-model="selectedNode.config.code_language" size="small" style="width:100%;">
                                    <el-option label="JavaScript" value="javascript" />
                                </el-select>
                            </div>
                            <div class="panel-field">
                                <label>代码 <span style="font-size:11px;color:#999;">（通过 inputs 对象读取上游输出，通过 return 返回结果）</span></label>
                                <el-input v-model="selectedNode.config.code" type="textarea" :rows="10" size="small"
                                    placeholder="// 通过 inputs 对象读取上游节点输出&#10;// 通过 return 返回结果&#10;const data = inputs;&#10;return JSON.stringify(data);"
                                    style="font-family:monospace;" />
                            </div>
                            <div class="panel-field">
                                <label>输入变量映射 <span style="font-size:11px;color:#999;">（JSON 格式：变量名 → ${node_id.output}）</span></label>
                                <el-input v-model="codeInputsJson" type="textarea" :rows="3" size="small"
                                    placeholder='{"data": "${llm_1.output}", "query": "${query}"}'
                                    @change="updateCodeInputs"
                                    style="font-family:monospace;" />
                            </div>
                            <div style="font-size:11px;color:#999;padding:4px 0;">
                                💡 代码在安全沙箱中执行，无法访问文件系统和网络。<br>
                                可用 <code>console.log()</code> 输出调试信息，<code>JSON.parse()</code> / <code>JSON.stringify()</code> 处理 JSON。<br>
                                如果不配置输入变量映射，将自动注入所有上游节点的输出。
                            </div>
                        </div>
                    </template>

                    <!-- Loop 循环节点配置（Phase 3） -->
                    <template v-if="selectedNode.type === 'loop'">
                        <div class="panel-section">
                            <div class="panel-section-title">🔁 循环配置</div>
                            <div class="panel-field">
                                <label>循环类型</label>
                                <el-select v-model="selectedNode.config.loop_type" size="small" style="width:100%;">
                                    <el-option label="for-each（遍历列表）" value="foreach" />
                                    <el-option label="while（条件循环）" value="while" />
                                </el-select>
                            </div>

                            <!-- for-each 模式配置 -->
                            <template v-if="selectedNode.config.loop_type !== 'while'">
                                <div class="panel-field">
                                    <label>遍历列表 <span style="font-size:11px;color:#999;">（JSON 数组或换行分隔的文本，支持 ${} 引用）</span></label>
                                    <el-input v-model="selectedNode.config.loop_list" type="textarea" :rows="3" size="small"
                                        placeholder='${llm_1.output} 或 ["a","b","c"]' />
                                </div>
                                <div class="panel-field">
                                    <label>当前元素变量名</label>
                                    <el-input v-model="selectedNode.config.loop_item_var" size="small" placeholder="item" />
                                </div>
                                <div class="panel-field">
                                    <label>当前索引变量名</label>
                                    <el-input v-model="selectedNode.config.loop_index_var" size="small" placeholder="index" />
                                </div>
                            </template>

                            <!-- while 模式配置 -->
                            <template v-if="selectedNode.config.loop_type === 'while'">
                                <div class="panel-field">
                                    <label>循环条件 <span style="font-size:11px;color:#999;">（JS 代码，返回 true 继续循环）</span></label>
                                    <el-input v-model="selectedNode.config.loop_condition" type="textarea" :rows="3" size="small"
                                        placeholder="return inputs.index < 5;"
                                        style="font-family:monospace;" />
                                </div>
                            </template>

                            <div class="panel-field">
                                <label>循环体代码 <span style="font-size:11px;color:#999;">（JS，每次迭代执行）</span></label>
                                <el-input v-model="selectedNode.config.loop_body" type="textarea" :rows="6" size="small"
                                    placeholder="// inputs.item = 当前元素&#10;// inputs.index = 当前索引&#10;// inputs.results = 之前的迭代结果&#10;return inputs.item;"
                                    style="font-family:monospace;" />
                            </div>
                            <div class="panel-field">
                                <label>最大迭代次数 <span style="font-size:11px;color:#999;">（安全限制）</span></label>
                                <el-input-number v-model="selectedNode.config.loop_max_iter" :min="1" :max="1000" size="small" style="width:100%;" />
                            </div>
                            <div style="font-size:11px;color:#999;padding:4px 0;">
                                💡 循环节点输出为所有迭代结果的 JSON 数组。<br>
                                for-each 模式：遍历列表中的每个元素执行循环体。<br>
                                while 模式：每次迭代先评估条件，为 true 则执行循环体。
                            </div>
                        </div>
                    </template>

                    <!-- 通用配置 -->
                    <div class="panel-section" v-if="selectedNode.type !== 'start' && selectedNode.type !== 'end'">
                        <div class="panel-section-title">高级配置</div>
                        <div class="panel-field">
                            <label>超时时间（秒）</label>
                            <el-input-number v-model="selectedNode.config.timeout_sec" :min="0" :max="300" size="small" style="width:100%;" />
                        </div>
                        <div class="panel-field">
                            <label>重试次数</label>
                            <el-input-number v-model="selectedNode.config.retry_count" :min="0" :max="5" size="small" style="width:100%;" />
                        </div>
                    </div>
                </div>
            </div>

            <!-- 执行面板（底部弹出） -->
            <div v-if="showEditorExec" class="exec-panel" style="position:absolute;bottom:0;left:220px;right:0;z-index:20;">
                <div class="exec-header">
                    <h4>▶ 执行工作流</h4>
                    <el-button text size="small" @click="showEditorExec = false">✕</el-button>
                </div>
                <div v-if="execRequiredVars.length > 0" style="margin-bottom:12px;">
                    <div style="font-size:12px;color:#999;margin-bottom:6px;">输入变量</div>
                    <div v-for="v in execRequiredVars" :key="v.name" class="var-input-row">
                        <label>{{ v.name }} <span v-if="v.required" class="var-required">*</span></label>
                        <el-input v-model="editorExecInputs[v.name]" :placeholder="v.description || v.name" size="small" style="flex:1;" />
                    </div>
                </div>
                <div style="margin-bottom:12px;">
                    <el-button type="primary" size="small" @click="doEditorExecute" :loading="editorExecuting">
                        {{ editorExecuting ? '执行中...' : '▶ 开始执行' }}
                    </el-button>
                </div>
                <div v-if="editorExecEvents.length > 0" style="max-height:400px;overflow-y:auto;">
                    <div v-for="(evt, i) in editorExecEvents" :key="i" class="exec-event" :class="evt.type">
                        <span class="event-icon">{{ eventIcon(evt.type) }}</span>
                        <span class="event-text" v-if="evt.type === 'node_output'">
                            <span class="node-label">{{ evt.node_name || evt.node_id }} 输出：</span>
                            <span class="node-output-content">{{ formatNodeOutput(evt.output) }}</span>
                        </span>
                        <span class="event-text" v-else>{{ eventText(evt) }}</span>
                        <span v-if="evt.duration_ms" class="event-time">{{ evt.duration_ms }}ms</span>
                    </div>
                </div>
                <div v-if="editorExecOutput" class="exec-output">{{ editorExecOutput }}</div>
            </div>
        </div>
    </template>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/@element-plus/icons-vue"></script>
<script src="https://unpkg.com/element-plus/dist/index.full.js"></script>
<script src="js/workflow.js"></script>
</body>
</html>
